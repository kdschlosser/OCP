parameters:
  name: 'Generate bindings'
  vmImage: 'ubuntu-latest'
  vmImage_compile: 'ubuntu-latest'
  platform: 'linux'
  py_maj: '3'
  py_min: '11'
  py_min_build:
  - '10'
  - '11'
  - '12'
  - '13'
  - '13t'
  config_file: 'ocp.toml'
  conda_bld: '3.27.0'
  conda_env_file: 'environment.devenv.yml'
  CXX: g++-13

jobs:
- job: ${{ parameters.name }}
  timeoutInMinutes: 360
  pool:
    vmImage: ${{ parameters.vmImage }}
  variables:
    n_cores: 2
  steps:
  - checkout: self
    submodules: true

  - ${{ if contains(parameters.vmImage, 'mac') }}:
    - bash: |
        curl -L -O https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz && \
        sudo mkdir -p /opt && \
        sudo tar -xf MacOSX11.3.sdk.tar.xz -C /opt && \
        sudo mkdir -p /opt/usr/local/ && \
        sudo ln -s /opt/MacOSX11.3.sdk/usr/include /opt/usr/local/include && \
        sudo ln -s /opt/MacOSX11.3.sdk/System/Library/Frameworks/OpenGL.framework/Headers /usr/local/include/OpenGL
      displayName: 'SDK install and symlink'

  - template: micromamba-enable.yml@templates
    parameters:
      python: 3.12
      mamba: 1.5
      vmImage: ${{ parameters.vmImage }}

  - bash: |
      micromamba run mamba-devenv -f ${{ parameters.conda_env_file }}
    displayName: 'Prepare conda environment'

  - bash: |
      env && \ 
      micromamba activate cpp-py-bindgen && \
      micromamba info && \
      micromamba list && \
      which python && \
      env
    displayName: 'Conda env sanity checks'

  - bash: |
      micromamba activate cpp-py-bindgen && \
      OUTPUT=`python -c'import toml; print(toml.load("${{ parameters.config_file }}")["output_folder"])'`  && \
      echo $OUTPUT && \
      echo "##vso[task.setvariable variable=OUTPUT;isOutput=true]$OUTPUT"
    displayName: 'Read output dir from the config file'
    name: 'conf'


  - ${{ if contains(parameters.platform, 'Windows') }}:
    - bash: |
        micromamba create --yes --platform win-64 --no-deps --prefix ./occt  occt=7.9.0 && \ 
        micromamba activate cpp-py-bindgen && \
        cmake -S . -B . -G Ninja -DPython_ROOT_DIR=$CONDA_PREFIX -DPython3_ROOT_DIR=$CONDA_PREFIX -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY -DOCCT_LIB_DIR=./occt/Library/bin/ -DPLATFORM=Windows && \
        cmake --build . -- -v
      displayName: 'CMake based pywrap call (linux to win)'
      name: 'Generate'

  - ${{ else }}:
    - bash: |
        micromamba activate cpp-py-bindgen && \
        cmake -DPython_ROOT_DIR=$CONDA_PREFIX -DPython3_ROOT_DIR=$CONDA_PREFIX -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY -B . -S . -G Ninja && \
        cmake --build .
      displayName: 'CMake based pywrap call'
      name: 'Generate'

  - task: CopyFiles@2
    inputs:
      contents: '*.pkl'
      targetFolder: $(conf.OUTPUT)_pkl
    displayName: 'Copy pkl outputs'

  - publish:  $(conf.OUTPUT)
    artifact: OCP_src_${{ parameters.platform }}

  - publish:  $(conf.OUTPUT)_pkl
    artifact: OCP_pkl_${{ parameters.platform }}

- ${{ each py_min in parameters.py_min_build }}:
  - job: ${{ parameters.name }}_${{ parameters.py_maj }}_${{ py_min }}
    timeoutInMinutes: 360
    dependsOn: ${{ parameters.name }}
    pool:
      vmImage: ${{ parameters.vmImage_compile }}
    variables:
      n_cores: 2
      OCP_src: OCP_src_${{ parameters.platform }}
    steps:
    - download: current
      artifact: OCP_src_${{ parameters.platform }}

    - ${{ if contains(parameters.vmImage_compile, 'mac') }}:
      - bash: |
          curl -L -O https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX10.15.sdk.tar.xz && \
          sudo mkdir -p /opt && \
          sudo tar -xf MacOSX10.15.sdk.tar.xz -C /opt
        displayName: 'SDK install'

    - template: micromamba-enable.yml@templates
      parameters:
        python: 3.12
        mamba: 1.5
        vmImage: ${{ parameters.vmImage_compile }}

    # Download standalone Python - Linux
    - ${{ if contains(parameters.vmImage_compile, 'Ubuntu') }}:
      - bash: |
          # Determine Python version URL
          if [[ "${{ py_min }}" == "13t" ]]; then
            PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64_v2-unknown-linux-gnu-freethreaded-install_only_stripped.tar.gz"
            PYTHON_EXE="python3.13t"
          elif [[ "${{ py_min }}" == "13" ]]; then
            PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64_v3-unknown-linux-gnu-install_only_stripped.tar.gz"
            PYTHON_EXE="python3.13"
          elif [[ "${{ py_min }}" == "12" ]]; then
            PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.12.9+20260408-x86_64_v3-unknown-linux-gnu-install_only_stripped.tar.gz"
            PYTHON_EXE="python3.12"
          elif [[ "${{ py_min }}" == "11" ]]; then
            PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.11.11+20260408-x86_64_v3-unknown-linux-gnu-install_only_stripped.tar.gz"
            PYTHON_EXE="python3.11"
          elif [[ "${{ py_min }}" == "10" ]]; then
            PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.10.16+20260408-x86_64_v3-unknown-linux-gnu-install_only_stripped.tar.gz"
            PYTHON_EXE="python3.10"
          fi
          
          echo "Downloading Python from: $PYTHON_URL"
          wget -O python.tar.gz "$PYTHON_URL"
          tar -xzf python.tar.gz
          
          echo "##vso[task.setvariable variable=PYTHON_PATH]$PWD/python/bin"
          echo "##vso[task.setvariable variable=PYTHON_ROOT]$PWD/python"
          echo "##vso[task.setvariable variable=PYTHON_EXE]$PYTHON_EXE"
        displayName: 'Download Python ${{ parameters.py_maj }}.${{ py_min }} (Linux)'

    # Download standalone Python - macOS
    - ${{ if contains(parameters.vmImage_compile, 'mac') }}:
      - bash: |
          ARCH=$(uname -m)
          
          # Determine Python version URL based on architecture
          if [[ "${{ py_min }}" == "13t" ]]; then
            if [[ "$ARCH" == "arm64" ]]; then
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-aarch64-apple-darwin-freethreaded-install_only_stripped.tar.gz"
            else
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64-apple-darwin-freethreaded-install_only_stripped.tar.gz"
            fi
            PYTHON_EXE="python3.13t"
          elif [[ "${{ py_min }}" == "13" ]]; then
            if [[ "$ARCH" == "arm64" ]]; then
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-aarch64-apple-darwin-install_only_stripped.tar.gz"
            else
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64-apple-darwin-install_only_stripped.tar.gz"
            fi
            PYTHON_EXE="python3.13"
          elif [[ "${{ py_min }}" == "12" ]]; then
            if [[ "$ARCH" == "arm64" ]]; then
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.12.9+20260408-aarch64-apple-darwin-install_only_stripped.tar.gz"
            else
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.12.9+20260408-x86_64-apple-darwin-install_only_stripped.tar.gz"
            fi
            PYTHON_EXE="python3.12"
          elif [[ "${{ py_min }}" == "11" ]]; then
            if [[ "$ARCH" == "arm64" ]]; then
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.11.11+20260408-aarch64-apple-darwin-install_only_stripped.tar.gz"
            else
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.11.11+20260408-x86_64-apple-darwin-install_only_stripped.tar.gz"
            fi
            PYTHON_EXE="python3.11"
          elif [[ "${{ py_min }}" == "10" ]]; then
            if [[ "$ARCH" == "arm64" ]]; then
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.10.16+20260408-aarch64-apple-darwin-install_only_stripped.tar.gz"
            else
              PYTHON_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.10.16+20260408-x86_64-apple-darwin-install_only_stripped.tar.gz"
            fi
            PYTHON_EXE="python3.10"
          fi
          
          echo "Architecture: $ARCH"
          echo "Downloading Python from: $PYTHON_URL"
          curl -L -o python.tar.gz "$PYTHON_URL"
          tar -xzf python.tar.gz
          
          echo "##vso[task.setvariable variable=PYTHON_PATH]$PWD/python/bin"
          echo "##vso[task.setvariable variable=PYTHON_ROOT]$PWD/python"
          echo "##vso[task.setvariable variable=PYTHON_EXE]$PYTHON_EXE"
        displayName: 'Download Python ${{ parameters.py_maj }}.${{ py_min }} (macOS)'

    # Download standalone Python - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          # Determine Python version URL
          $pyMin = "${{ py_min }}"
          if ($pyMin -eq "13t") {
            $pythonUrl = "https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64-pc-windows-msvc-freethreaded-install_only_stripped.tar.gz"
            $pythonExe = "python3.13t.exe"
          } elseif ($pyMin -eq "13") {
            $pythonUrl = "https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
            $pythonExe = "python3.13.exe"
          } elseif ($pyMin -eq "12") {
            $pythonUrl = "https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.12.9+20260408-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
            $pythonExe = "python3.12.exe"
          } elseif ($pyMin -eq "11") {
            $pythonUrl = "https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.11.11+20260408-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
            $pythonExe = "python3.11.exe"
          } elseif ($pyMin -eq "10") {
            $pythonUrl = "https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.10.16+20260408-x86_64-pc-windows-msvc-install_only_stripped.tar.gz"
            $pythonExe = "python3.10.exe"
          }
          
          Write-Host "Downloading Python from: $pythonUrl"
          curl.exe -L -o python.tar.gz "$pythonUrl"
          tar -xzf python.tar.gz
          
          $pythonPath = Join-Path $PWD "python"
          echo "##vso[task.setvariable variable=PYTHON_PATH]$pythonPath"
          echo "##vso[task.setvariable variable=PYTHON_ROOT]$pythonPath"
          echo "##vso[task.setvariable variable=PYTHON_EXE]$pythonExe"
        displayName: 'Download Python ${{ parameters.py_maj }}.${{ py_min }} (Windows)'

    # Install Python packages via pip - Linux/macOS
    - ${{ if not(contains(parameters.vmImage_compile, 'win')) }}:
      - bash: |
          export PATH="${PYTHON_PATH}:$PATH"
          
          echo "Python executable: ${PYTHON_EXE}"
          ${PYTHON_PATH}/${PYTHON_EXE} --version
          
          ${PYTHON_PATH}/${PYTHON_EXE} -m pip install --upgrade pip
          ${PYTHON_PATH}/${PYTHON_EXE} -m pip install "pybind11>=3.0.0"
          ${PYTHON_PATH}/${PYTHON_EXE} -m pip install pybind11-stubgen==2.5.1
        displayName: 'Install Python packages (Unix)'

    # Install Python packages via pip - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          $env:PATH = "${env:PYTHON_PATH};$env:PATH"
          
          Write-Host "Python executable: ${env:PYTHON_EXE}"
          & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" --version
          
          & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" -m pip install --upgrade pip
          & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" -m pip install "pybind11>=3.0.0"
          & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" -m pip install pybind11-stubgen==2.5.1
        displayName: 'Install Python packages (Windows)'

    # Create conda env for C++ dependencies only - Linux/macOS
    - ${{ if not(contains(parameters.vmImage_compile, 'win')) }}:
      - bash: |
          micromamba create -n cpp-libs -y -c conda-forge \
            occt=7.9.3=all* fmt vtk tbb-devel cmake ninja
        displayName: 'Setup C++ libraries (conda - Unix)'

    # Create conda env for C++ dependencies only - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          micromamba create -n cpp-libs -y -c conda-forge occt=7.9.3 fmt vtk tbb-devel cmake ninja
        displayName: 'Setup C++ libraries (conda - Windows)'

    # Compile - Linux
    - ${{ if contains(parameters.vmImage_compile, 'Ubuntu') }}:
      - bash: |
          eval "$(micromamba shell hook --shell bash)"
          micromamba activate cpp-libs
          
          export PATH="${PYTHON_PATH}:$PATH"
          
          echo "Python: ${PYTHON_EXE}"
          ${PYTHON_PATH}/${PYTHON_EXE} --version
          
          PYBIND11_DIR=$(${PYTHON_PATH}/${PYTHON_EXE} -c "import pybind11; print(pybind11.get_cmake_dir())")
          echo "pybind11 dir: ${PYBIND11_DIR}"
          
          CMAKE_CXX_FLAGS=""
          if [[ "${{ py_min }}" == "13t" ]]; then
            CMAKE_CXX_FLAGS="-DOCP_REQUIRES_GIL=1"
          fi
          
          cmake -B build -S "../$(OCP_src)" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPython_EXECUTABLE="${PYTHON_PATH}/${PYTHON_EXE}" \
            -DPython3_EXECUTABLE="${PYTHON_PATH}/${PYTHON_EXE}" \
            -DPython_ROOT_DIR="${PYTHON_ROOT}" \
            -DPython3_ROOT_DIR="${PYTHON_ROOT}" \
            -DPython_FIND_STRATEGY=LOCATION \
            -DPython3_FIND_STRATEGY=LOCATION \
            -Dpybind11_DIR="${PYBIND11_DIR}" \
            -DCMAKE_PREFIX_PATH="${CONDA_PREFIX}" \
            -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS}"
          
          cmake --build build -j $(n_cores) -- -k 0
          rm -rf build/CMakeFiles
        displayName: 'Compile (Linux)'

    # Compile - macOS
    - ${{ if contains(parameters.vmImage_compile, 'mac') }}:
      - bash: |
          eval "$(micromamba shell hook --shell bash)"
          micromamba activate cpp-libs
          
          export PATH="${PYTHON_PATH}:$PATH"
          
          echo "Python: ${PYTHON_EXE}"
          ${PYTHON_PATH}/${PYTHON_EXE} --version
          
          PYBIND11_DIR=$(${PYTHON_PATH}/${PYTHON_EXE} -c "import pybind11; print(pybind11.get_cmake_dir())")
          echo "pybind11 dir: ${PYBIND11_DIR}"
          
          CMAKE_CXX_FLAGS=""
          if [[ "${{ py_min }}" == "13t" ]]; then
            CMAKE_CXX_FLAGS="-DOCP_REQUIRES_GIL=1"
          fi
          
          cmake -B build -S "../$(OCP_src)" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_SYSROOT=/opt/MacOSX10.15.sdk/ \
            -DPython_EXECUTABLE="${PYTHON_PATH}/${PYTHON_EXE}" \
            -DPython3_EXECUTABLE="${PYTHON_PATH}/${PYTHON_EXE}" \
            -DPython_ROOT_DIR="${PYTHON_ROOT}" \
            -DPython3_ROOT_DIR="${PYTHON_ROOT}" \
            -DPython_FIND_STRATEGY=LOCATION \
            -DPython3_FIND_STRATEGY=LOCATION \
            -Dpybind11_DIR="${PYBIND11_DIR}" \
            -DCMAKE_PREFIX_PATH="${CONDA_PREFIX}" \
            -DCMAKE_CXX_FLAGS="${CMAKE_CXX_FLAGS}"
          
          cmake --build build -j $(n_cores) -- -k 0
          rm -rf build/CMakeFiles
        displayName: 'Compile (macOS)'

    # Compile - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          micromamba shell hook -s powershell | Out-String | Invoke-Expression
          micromamba activate cpp-libs
          
          $env:PATH = "${env:PYTHON_PATH};$env:PATH"
          
          Write-Host "Python: ${env:PYTHON_EXE}"
          & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" --version
          
          $PYBIND11_DIR = & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" -c "import pybind11; print(pybind11.get_cmake_dir())"
          Write-Host "pybind11 dir: $PYBIND11_DIR"
          
          # Remove any existing build directory
          if (Test-Path build) {
            Remove-Item -Recurse -Force build
          }
          
          $CMAKE_CXX_FLAGS = ""
          if ("${{ py_min }}" -eq "13t") {
            $CMAKE_CXX_FLAGS = "/DOCP_REQUIRES_GIL=1"
          }
          
          $cmakeArgs = @(
            "-B", "build",
            "-S", "..\$(OCP_src)",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DPython_EXECUTABLE=${env:PYTHON_PATH}\${env:PYTHON_EXE}",
            "-DPython3_EXECUTABLE=${env:PYTHON_PATH}\${env:PYTHON_EXE}",
            "-DPython_ROOT_DIR=${env:PYTHON_ROOT}",
            "-DPython3_ROOT_DIR=${env:PYTHON_ROOT}",
            "-DPython_FIND_STRATEGY=LOCATION",
            "-DPython3_FIND_STRATEGY=LOCATION",
            "-Dpybind11_DIR=$PYBIND11_DIR",
            "-DCMAKE_PREFIX_PATH=${env:CONDA_PREFIX}",
            "-DCMAKE_LINKER=lld-link.exe"
          )
          
          if ($CMAKE_CXX_FLAGS -ne "") {
            $cmakeArgs += "-DCMAKE_CXX_FLAGS=$CMAKE_CXX_FLAGS"
          }
          
          & cmake @cmakeArgs
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "CMake configuration failed!"
            exit 1
          }
          
          cmake --build build -j 1 -- -v -k 0
          
          if ($LASTEXITCODE -ne 0) {
            Write-Host "CMake build failed!"
            exit 1
          }
          
          cmake -E rm -rf build\CMakeFiles
        displayName: 'Compile (Windows)'

    # Generate stubs - Linux/macOS
    - ${{ if not(contains(parameters.vmImage_compile, 'win')) }}:
      - bash: |
          eval "$(micromamba shell hook --shell bash)"
          micromamba activate cpp-libs
          
          export PATH="${PYTHON_PATH}:$PATH"
          export PYTHONPATH="$PWD/build"
          cd build
          
          # Debug: Check if OCP module exists
          ls -la *.so 2>/dev/null || echo "No .so files found"
          
          # Generate stubs
          GIL_FLAG=""
          if [[ "${{ py_min }}" == "13t" ]]; then
            GIL_FLAG="-Xgil=1"
          fi
          
          ${PYTHON_PATH}/${PYTHON_EXE} ${GIL_FLAG} -m pybind11_stubgen -o . OCP
          
          rm -rf OCP-stubs/setup.py OCP-stubs/__pycache__ OCP-stubs/MANIFEST.in
          mkdir -p ../upload
          cp -r "../../$(OCP_src)" ../upload
          cp -r OCP-stubs ../upload/
        displayName: 'Generate stubs and prepare for upload (Unix)'

    # Generate stubs - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          micromamba shell hook -s powershell | Out-String | Invoke-Expression
          micromamba activate cpp-libs
          
          $env:PATH = "${env:PYTHON_PATH};$env:PATH"
          $buildPath = Join-Path $PWD "build"
          $env:PYTHONPATH = $buildPath
          cd build
          
          # Debug: Check if OCP module exists
          Get-ChildItem *.pyd -ErrorAction SilentlyContinue
          
          # Generate stubs
          $gilFlag = @()
          if ("${{ py_min }}" -eq "13t") {
            $gilFlag = @("-Xgil=1")
          }
          
          $stubgenArgs = $gilFlag + @("-m", "pybind11_stubgen", "-o", ".", "OCP")
          & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" @stubgenArgs
          
          Remove-Item -Recurse -Force OCP-stubs/setup.py -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force OCP-stubs/__pycache__ -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force OCP-stubs/MANIFEST.in -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path ../upload
          Copy-Item -Recurse "../../$(OCP_src)" ../upload
          Copy-Item -Recurse OCP-stubs ../upload/
        displayName: 'Generate stubs and prepare for upload (Windows)'

    - task: PublishBuildArtifacts@1
      inputs:
        pathtoPublish: 'upload'
        artifactName: OCP_src_stubs_${{ parameters.platform }}_py${{ py_min }}
      displayName: 'Publish stubs and sources together'

    - task: PublishBuildArtifacts@1
      inputs:
        pathtoPublish: 'build'
        artifactName: OCP_${{ parameters.platform }}_py${{ py_min }}
      displayName: 'Publish compilation result'

    # Test - Linux
    - ${{ if contains(parameters.vmImage_compile, 'Ubuntu') }}:
      - bash: |
          eval "$(micromamba shell hook --shell bash)"
          micromamba activate cpp-libs
          
          export PATH="${PYTHON_PATH}:$PATH"
          export PYTHONPATH="$PWD/build"
          cd build
          
          if [[ "${{ py_min }}" == "13t" ]]; then
            LD_DEBUG=libs ${PYTHON_PATH}/${PYTHON_EXE} -Xgil=1 -c"import OCP; import sys; print(f'Python: {sys.version}'); print(f'GIL enabled: {sys._is_gil_enabled()}')"
          else
            LD_DEBUG=libs ${PYTHON_PATH}/${PYTHON_EXE} -c"import OCP; import sys; print(f'Python: {sys.version}')"
          fi
        displayName: 'Test (Linux)'

    # Test - macOS
    - ${{ if contains(parameters.vmImage_compile, 'mac') }}:
      - bash: |
          eval "$(micromamba shell hook --shell bash)"
          micromamba activate cpp-libs
          
          export PATH="${PYTHON_PATH}:$PATH"
          export PYTHONPATH="$PWD/build"
          cd build
          
          if [[ "${{ py_min }}" == "13t" ]]; then
            ${PYTHON_PATH}/${PYTHON_EXE} -Xgil=1 -c"import OCP; import sys; print(f'Python: {sys.version}'); print(f'GIL enabled: {sys._is_gil_enabled()}')"
          else
            ${PYTHON_PATH}/${PYTHON_EXE} -c"import OCP; import sys; print(f'Python: {sys.version}')"
          fi
        displayName: 'Test (macOS)'

    # Test - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          micromamba shell hook -s powershell | Out-String | Invoke-Expression
          micromamba activate cpp-libs
          
          $env:PATH = "${env:PYTHON_PATH};$env:PATH"
          $buildPath = Join-Path $PWD "build"
          $env:PYTHONPATH = $buildPath
          cd build
          
          if ("${{ py_min }}" -eq "13t") {
            & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" -Xgil=1 -c "import OCP; import sys; print(f'Python: {sys.version}'); print(f'GIL enabled: {sys._is_gil_enabled()}')"
          } else {
            & "${env:PYTHON_PATH}\${env:PYTHON_EXE}" -c "import OCP; import sys; print(f'Python: {sys.version}')"
          }
        displayName: 'Test (Windows)'

    # Build conda package - non-PR, regular Python
    - bash: |
          micromamba create -n build -y -c conda-forge python=3.11 liblief=0.14.1 conda-build anaconda-client && \
          micromamba activate build && \
          conda build --token $TOKEN --user cadquery --label dev -c conda-forge --override-channels conda
      displayName: 'Build conda package'
      condition: and(ne(variables['Build.Reason'], 'PullRequest'), ne('${{ py_min }}', '13t'))
      env:
        BUILD_STRING: "1"
        PYTHON_VERSION: ${{ parameters.py_maj }}.${{ py_min }}
        TOKEN: $(anaconda.TOKEN)

    # Build conda package - PR, regular Python
    - bash: |
          micromamba create -n build -y -c conda-forge python=3.11 liblief=0.14.1 conda-build anaconda-client && \
          micromamba activate build && \
          conda build -c conda-forge --override-channels conda
      displayName: 'Build conda package (PR)'
      condition: and(eq(variables['Build.Reason'], 'PullRequest'), ne('${{ py_min }}', '13t'))
      env:
        BUILD_STRING: "1"
        PYTHON_VERSION: ${{ parameters.py_maj }}.${{ py_min }}
        TOKEN: $(anaconda.TOKEN)