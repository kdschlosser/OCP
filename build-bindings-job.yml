parameters:
  name: 'Generate bindings'
  vmImage: 'ubuntu-latest'
  vmImage_compile: 'ubuntu-latest'
  platform: 'linux'
  py_maj: '3'
  py_min: '11'
  py_min_build:
  - '10'
  - '11'
  - '12'
  - '13'
  - '13t'
  config_file: 'ocp.toml'
  conda_bld: '3.27.0'
  conda_env_file: 'environment.devenv.yml'
  CXX: g++-13

jobs:
- job: ${{ parameters.name }}
  timeoutInMinutes: 360
  pool:
    vmImage: ${{ parameters.vmImage }}
  variables:
    n_cores: 2
  steps:
  - checkout: self
    submodules: true

  - ${{ if contains(parameters.vmImage, 'mac') }}:
    - bash: |
        curl -L -O https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz && \
        sudo mkdir -p /opt && \
        sudo tar -xf MacOSX11.3.sdk.tar.xz -C /opt && \
        sudo mkdir -p /opt/usr/local/ && \
        sudo ln -s /opt/MacOSX11.3.sdk/usr/include /opt/usr/local/include && \
        sudo ln -s /opt/MacOSX11.3.sdk/System/Library/Frameworks/OpenGL.framework/Headers /usr/local/include/OpenGL
      displayName: 'SDK install and symlink'

  - template: micromamba-enable.yml@templates
    parameters:
      python: 3.12
      mamba: 1.5
      vmImage: ${{ parameters.vmImage }}

  - bash: |
      micromamba run mamba-devenv -f ${{ parameters.conda_env_file }}
    displayName: 'Prepare conda environment'

  - bash: |
      env && \ 
      micromamba activate cpp-py-bindgen && \
      micromamba info && \
      micromamba list && \
      which python && \
      env
    displayName: 'Conda env sanity checks'

  - bash: |
      micromamba activate cpp-py-bindgen && \
      OUTPUT=`python -c'import toml; print(toml.load("${{ parameters.config_file }}")["output_folder"])'`  && \
      echo $OUTPUT && \
      echo "##vso[task.setvariable variable=OUTPUT;isOutput=true]$OUTPUT"
    displayName: 'Read output dir from the config file'
    name: 'conf'


  - ${{ if contains(parameters.platform, 'Windows') }}:
    - bash: |
        micromamba create --yes --platform win-64 --no-deps --prefix ./occt  occt=7.9.0 && \ 
        micromamba activate cpp-py-bindgen && \
        cmake -S . -B . -G Ninja -DPython_ROOT_DIR=$CONDA_PREFIX -DPython3_ROOT_DIR=$CONDA_PREFIX -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY -DOCCT_LIB_DIR=./occt/Library/bin/ -DPLATFORM=Windows && \
        cmake --build . -- -v
      displayName: 'CMake based pywrap call (linux to win)'
      name: 'Generate'

  - ${{ else }}:
    - bash: |
        micromamba activate cpp-py-bindgen && \
        cmake -DPython_ROOT_DIR=$CONDA_PREFIX -DPython3_ROOT_DIR=$CONDA_PREFIX -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY -B . -S . -G Ninja && \
        cmake --build .
      displayName: 'CMake based pywrap call'
      name: 'Generate'

  - task: CopyFiles@2
    inputs:
      contents: '*.pkl'
      targetFolder: $(conf.OUTPUT)_pkl
    displayName: 'Copy pkl outputs'

  - publish:  $(conf.OUTPUT)
    artifact: OCP_src_${{ parameters.platform }}

  - publish:  $(conf.OUTPUT)_pkl
    artifact: OCP_pkl_${{ parameters.platform }}

- ${{ each py_min in parameters.py_min_build }}:
  - job: ${{ parameters.name }}_${{ parameters.py_maj }}_${{ py_min }}
    timeoutInMinutes: 360
    dependsOn: ${{ parameters.name }}
    pool:
      vmImage: ${{ parameters.vmImage_compile }}
    variables:
      n_cores: 2
      OCP_src: OCP_src_${{ parameters.platform }}
    steps:
    - download: current
      artifact: OCP_src_${{ parameters.platform }}

    - ${{ if contains(parameters.vmImage_compile, 'mac') }}:
      - bash: |
          curl -L -O https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX10.15.sdk.tar.xz && \
          sudo mkdir -p /opt && \
          sudo tar -xf MacOSX10.15.sdk.tar.xz -C /opt
        displayName: 'SDK install'

    - template: micromamba-enable.yml@templates
      parameters:
        python: 3.12
        mamba: 1.5
        vmImage: ${{ parameters.vmImage_compile }}

    # Download Python 3.13t for Linux
    - ${{ if and(eq(py_min, '13t'), contains(parameters.vmImage_compile, 'Ubuntu')) }}:
      - bash: |
          wget -O python313t.tar.gz https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64_v2-unknown-linux-gnu-freethreaded-install_only_stripped.tar.gz
          tar -xzf python313t.tar.gz
          echo "##vso[task.setvariable variable=PYTHON_313T_PATH]$PWD/python/bin"
          echo "##vso[task.setvariable variable=PYTHON_313T_ROOT]$PWD/python"
        displayName: 'Download Python 3.13t (Linux)'

    # Download Python 3.13t for macOS - detect architecture
    - ${{ if and(eq(py_min, '13t'), contains(parameters.vmImage_compile, 'mac')) }}:
      - bash: |
          ARCH=$(uname -m)
          if [[ "$ARCH" == "arm64" ]]; then
            echo "Downloading Python 3.13t for Apple Silicon (aarch64)"
            curl -L -o python313t.tar.gz https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-aarch64-apple-darwin-freethreaded-install_only_stripped.tar.gz
          else
            echo "Downloading Python 3.13t for Intel (x86_64)"
            curl -L -o python313t.tar.gz https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64-apple-darwin-freethreaded-install_only_stripped.tar.gz
          fi
          tar -xzf python313t.tar.gz
          echo "##vso[task.setvariable variable=PYTHON_313T_PATH]$PWD/python/bin"
          echo "##vso[task.setvariable variable=PYTHON_313T_ROOT]$PWD/python"
        displayName: 'Download Python 3.13t (macOS)'

    # Download Python 3.13t for Windows
    - ${{ if and(eq(py_min, '13t'), contains(parameters.vmImage_compile, 'win')) }}:
      - powershell: |
          curl.exe -L -o python313t.tar.gz "https://github.com/astral-sh/python-build-standalone/releases/download/20260408/cpython-3.13.13+20260408-x86_64-pc-windows-msvc-freethreaded-install_only_stripped.tar.gz"
          tar -xzf python313t.tar.gz
          $pythonPath = Join-Path $PWD "python"
          echo "##vso[task.setvariable variable=PYTHON_313T_PATH]$pythonPath"
          echo "##vso[task.setvariable variable=PYTHON_313T_ROOT]$pythonPath"
        displayName: 'Download Python 3.13t (Windows)'

    # Prepare conda environment - regular Python
    - ${{ if ne(py_min, '13t') }}:
      - bash: |
          micromamba run mamba-devenv -f  ${{ parameters.conda_env_file }}
        displayName: 'Prepare conda environment'
        env:
          PYTHON_VERSION: ${{ parameters.py_maj }}.${{ py_min }}
          STAGE: "compile"

    # Prepare environment for Python 3.13t - Linux/macOS
    - ${{ if and(eq(py_min, '13t'), not(contains(parameters.vmImage_compile, 'win'))) }}:
      - bash: |
          # Install Python deps via pip using python3.13t executable
          ${PYTHON_313T_PATH}/python3.13t -m pip install --upgrade pip
          ${PYTHON_313T_PATH}/python3.13t -m pip install "pybind11>=3.0.0"
          ${PYTHON_313T_PATH}/python3.13t -m pip install git+https://github.com/CadQuery/pybind11-stubgen.git
          
          # Create conda env for C++ dependencies (without Python)
          micromamba create -n cpp-py-bindgen -y -c conda-forge \
            occt=7.9.3=all* fmt vtk tbb-devel cmake ninja
        displayName: 'Prepare environment for Python 3.13t (Linux/macOS)'

    # Prepare environment for Python 3.13t - Windows
    - ${{ if and(eq(py_min, '13t'), contains(parameters.vmImage_compile, 'win')) }}:
      - powershell: |
          # Install Python deps via pip using python3.13t.exe executable
          & "${env:PYTHON_313T_PATH}\python3.13t.exe" -m pip install --upgrade pip
          & "${env:PYTHON_313T_PATH}\python3.13t.exe" -m pip install "pybind11>=3.0.0"
          & "${env:PYTHON_313T_PATH}\python3.13t.exe" -m pip install git+https://github.com/CadQuery/pybind11-stubgen.git
          
          # Create conda env for C++ dependencies (without Python)
          micromamba create -n cpp-py-bindgen -y -c conda-forge occt=7.9.3 fmt vtk tbb-devel cmake ninja
        displayName: 'Prepare environment for Python 3.13t (Windows)'

    # Compile - Linux
    - ${{ if contains(parameters.vmImage_compile, 'Ubuntu') }}:
      - bash: |
          if [[ "${{ py_min }}" == "13t" ]]; then
            eval "$(micromamba shell hook --shell bash)"
            micromamba activate cpp-py-bindgen
            
            export PATH="${PYTHON_313T_PATH}:$PATH"
            
            # Use python3.13t executable
            PYBIND11_DIR=$(${PYTHON_313T_PATH}/python3.13t -c "import pybind11; print(pybind11.get_cmake_dir())")
            
            cmake -B build -S "../$(OCP_src)" -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DPython_EXECUTABLE="${PYTHON_313T_PATH}/python3.13t" \
              -DPython3_EXECUTABLE="${PYTHON_313T_PATH}/python3.13t" \
              -DPython_ROOT_DIR="${PYTHON_313T_ROOT}" \
              -DPython3_ROOT_DIR="${PYTHON_313T_ROOT}" \
              -DPython_FIND_STRATEGY=LOCATION \
              -DPython3_FIND_STRATEGY=LOCATION \
              -Dpybind11_DIR="${PYBIND11_DIR}" \
              -DCMAKE_PREFIX_PATH="${CONDA_PREFIX}"
          else
            micromamba activate cpp-py-bindgen
            micromamba list
            cmake -B build -S "../$(OCP_src)" -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build -j $(n_cores) -- -k 0
          rm -rf build/CMakeFiles
        displayName: 'Compile'

    # Compile - macOS
    - ${{ if contains(parameters.vmImage_compile, 'mac') }}:
      - bash: |
          if [[ "${{ py_min }}" == "13t" ]]; then
            eval "$(micromamba shell hook --shell bash)"
            micromamba activate cpp-py-bindgen
            
            export PATH="${PYTHON_313T_PATH}:$PATH"
            
            # Use python3.13t executable
            PYBIND11_DIR=$(${PYTHON_313T_PATH}/python3.13t -c "import pybind11; print(pybind11.get_cmake_dir())")
            
            cmake -B build -S "../$(OCP_src)" -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_SYSROOT=/opt/MacOSX10.15.sdk/ \
              -DPython_EXECUTABLE="${PYTHON_313T_PATH}/python3.13t" \
              -DPython3_EXECUTABLE="${PYTHON_313T_PATH}/python3.13t" \
              -DPython_ROOT_DIR="${PYTHON_313T_ROOT}" \
              -DPython3_ROOT_DIR="${PYTHON_313T_ROOT}" \
              -DPython_FIND_STRATEGY=LOCATION \
              -DPython3_FIND_STRATEGY=LOCATION \
              -Dpybind11_DIR="${PYBIND11_DIR}" \
              -DCMAKE_PREFIX_PATH="${CONDA_PREFIX}"
          else
            micromamba activate cpp-py-bindgen
            cmake -B build -S "../$(OCP_src)" -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_OSX_SYSROOT=/opt/MacOSX10.15.sdk/
          fi
          cmake --build build -j $(n_cores) -- -k 0
          rm -rf build/CMakeFiles
        displayName: 'Compile'

    # Compile - Windows
    - ${{ if contains(parameters.vmImage_compile, 'win') }}:
      - powershell: |
          if ("${{ py_min }}" -eq "13t") {
            micromamba shell hook -s powershell | Out-String | Invoke-Expression
            micromamba activate cpp-py-bindgen
            
            $env:PATH = "${env:PYTHON_313T_PATH};$env:PATH"
            
            # Use python3.13t.exe executable
            $PYBIND11_DIR = & "${env:PYTHON_313T_PATH}\python3.13t.exe" -c "import pybind11; print(pybind11.get_cmake_dir())"
            
            cmake -B build -S "../$(OCP_src)" -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              -DPython_EXECUTABLE="${env:PYTHON_313T_PATH}\python3.13t.exe" `
              -DPython3_EXECUTABLE="${env:PYTHON_313T_PATH}\python3.13t.exe" `
              -DPython_ROOT_DIR="${env:PYTHON_313T_ROOT}" `
              -DPython3_ROOT_DIR="${env:PYTHON_313T_ROOT}" `
              -DPython_FIND_STRATEGY=LOCATION `
              -DPython3_FIND_STRATEGY=LOCATION `
              -Dpybind11_DIR="$PYBIND11_DIR" `
              -DCMAKE_PREFIX_PATH="${env:CONDA_PREFIX}" `
              -DCMAKE_LINKER=lld-link.exe
            
            cmake --build build -j 1 -- -v -k 0
            cmake -E rm -rf build\CMakeFiles
          } else {
            micromamba run -n cpp-py-bindgen cmake -B build -S "../$(OCP_src)" -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              -DPython3_FIND_STRATEGY=LOCATION `
              -DPython3_ROOT_DIR=$env:CONDA_PREFIX `
              -DCMAKE_LINKER=lld-link.exe
            
            micromamba run -n cpp-py-bindgen cmake --build build -j 1 -- -v -k 0
            micromamba run -n cpp-py-bindgen cmake -E rm -rf build\CMakeFiles
          }
        displayName: 'Compile'

    # Generate stubs - regular Python
    - bash: |
        micromamba activate cpp-py-bindgen && \
        cd build && \
        python -m pybind11_stubgen -o . OCP && \
        rm -rf OCP-stubs/setup.py OCP-stubs/__pycache__ OCP-stubs/MANIFEST.in && \
        mkdir -p ../upload && \
        cp -r "../../$(OCP_src)" ../upload && \
        cp -r OCP-stubs ../upload/
      displayName: 'Generate stubs and prepare for upload (regular Python)'
      condition: ne('${{ py_min }}', '13t')

    # Generate stubs - Python 3.13t (Linux/macOS)
    - bash: |
        eval "$(micromamba shell hook --shell bash)"
        micromamba activate cpp-py-bindgen
        export PATH="${PYTHON_313T_PATH}:$PATH"
        export PYTHONPATH="$PWD/build"
        cd build
        # Use python3.13t executable
        ${PYTHON_313T_PATH}/python3.13t -m pybind11_stubgen -o . OCP
        rm -rf OCP-stubs/setup.py OCP-stubs/__pycache__ OCP-stubs/MANIFEST.in
        mkdir -p ../upload
        cp -r "../../$(OCP_src)" ../upload
        cp -r OCP-stubs ../upload/
      displayName: 'Generate stubs and prepare for upload (Python 3.13t Unix)'
      condition: and(eq('${{ py_min }}', '13t'), not(contains(variables['Agent.OS'], 'Windows_NT')))

    # Generate stubs - Python 3.13t (Windows)
    - powershell: |
        micromamba shell hook -s powershell | Out-String | Invoke-Expression
        micromamba activate cpp-py-bindgen
        $env:PATH = "${env:PYTHON_313T_PATH};$env:PATH"
        $buildPath = Join-Path $PWD "build"
        $env:PYTHONPATH = $buildPath
        cd build
        # Use python3.13t.exe executable
        & "${env:PYTHON_313T_PATH}\python3.13t.exe" -m pybind11_stubgen -o . OCP
        Remove-Item -Recurse -Force OCP-stubs/setup.py -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force OCP-stubs/__pycache__ -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force OCP-stubs/MANIFEST.in -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path ../upload
        Copy-Item -Recurse "../../$(OCP_src)" ../upload
        Copy-Item -Recurse OCP-stubs ../upload/
      displayName: 'Generate stubs and prepare for upload (Python 3.13t Windows)'
      condition: and(eq('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Windows_NT'))

    - task: PublishBuildArtifacts@1
      inputs:
        pathtoPublish: 'upload'
        artifactName: OCP_src_stubs_${{ parameters.platform }}_py${{ py_min }}
      displayName: 'Publish stubs and sources together'

    - task: PublishBuildArtifacts@1
      inputs:
        pathtoPublish: 'build'
        artifactName: OCP_${{ parameters.platform }}_py${{ py_min }}
      displayName: 'Publish compilation result'

    # Test - regular Python (Linux with LD_DEBUG)
    - bash: |
        micromamba activate cpp-py-bindgen && \
        cd build && \
        LD_DEBUG=libs python -c"import OCP"
      displayName: 'Test (regular Python Linux)'
      condition: and(ne('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Linux'))

    # Test - regular Python (macOS)
    - bash: |
        micromamba activate cpp-py-bindgen && \
        cd build && \
        python -c"import OCP"
      displayName: 'Test (regular Python macOS)'
      condition: and(ne('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Darwin'))

    # Test - regular Python (Windows)
    - bash: |
        micromamba activate cpp-py-bindgen && \
        cd build && \
        python -c"import OCP"
      displayName: 'Test (regular Python Windows)'
      condition: and(ne('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Windows_NT'))

    # Test - Python 3.13t (Linux)
    - bash: |
        eval "$(micromamba shell hook --shell bash)"
        micromamba activate cpp-py-bindgen
        export PATH="${PYTHON_313T_PATH}:$PATH"
        export PYTHONPATH="$PWD/build"
        cd build
        # Use python3.13t executable
        ${PYTHON_313T_PATH}/python3.13t -c"import OCP; import sys; print(f'Python: {sys.version}'); print(f'GIL enabled: {sys._is_gil_enabled()}')"
      displayName: 'Test (Python 3.13t Linux)'
      condition: and(eq('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Linux'))

    # Test - Python 3.13t (macOS)
    - bash: |
        eval "$(micromamba shell hook --shell bash)"
        micromamba activate cpp-py-bindgen
        export PATH="${PYTHON_313T_PATH}:$PATH"
        export PYTHONPATH="$PWD/build"
        cd build
        # Use python3.13t executable
        ${PYTHON_313T_PATH}/python3.13t -c"import OCP; import sys; print(f'Python: {sys.version}'); print(f'GIL enabled: {sys._is_gil_enabled()}')"
      displayName: 'Test (Python 3.13t macOS)'
      condition: and(eq('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Darwin'))

    # Test - Python 3.13t (Windows)
    - powershell: |
        micromamba shell hook -s powershell | Out-String | Invoke-Expression
        micromamba activate cpp-py-bindgen
        $env:PATH = "${env:PYTHON_313T_PATH};$env:PATH"
        $buildPath = Join-Path $PWD "build"
        $env:PYTHONPATH = $buildPath
        cd build
        # Use python3.13t.exe executable
        & "${env:PYTHON_313T_PATH}\python3.13t.exe" -c "import OCP; import sys; print(f'Python: {sys.version}'); print(f'GIL enabled: {sys._is_gil_enabled()}')"
      displayName: 'Test (Python 3.13t Windows)'
      condition: and(eq('${{ py_min }}', '13t'), contains(variables['Agent.OS'], 'Windows_NT'))

    # Build conda package - non-PR, regular Python
    - bash: |
          micromamba create -n build -y -c conda-forge python=3.11 liblief=0.14.1 conda-build anaconda-client && \
          micromamba activate build && \
          conda build --token $TOKEN --user cadquery --label dev -c conda-forge --override-channels conda
      displayName: 'Build conda package'
      condition: and(ne(variables['Build.Reason'], 'PullRequest'), ne('${{ py_min }}', '13t'))
      env:
        BUILD_STRING: "1"
        PYTHON_VERSION: ${{ parameters.py_maj }}.${{ py_min }}
        TOKEN: $(anaconda.TOKEN)

    # Build conda package - PR, regular Python
    - bash: |
          micromamba create -n build -y -c conda-forge python=3.11 liblief=0.14.1 conda-build anaconda-client && \
          micromamba activate build && \
          conda build -c conda-forge --override-channels conda
      displayName: 'Build conda package (PR)'
      condition: and(eq(variables['Build.Reason'], 'PullRequest'), ne('${{ py_min }}', '13t'))
      env:
        BUILD_STRING: "1"
        PYTHON_VERSION: ${{ parameters.py_maj }}.${{ py_min }}
        TOKEN: $(anaconda.TOKEN)